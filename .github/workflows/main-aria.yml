name: ARIA Pipeline

on:
  push:
    branches:
      - main

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:

      - name: Run Application
        id: run_app
        run: |
          echo "Running app..."
          exit 0

      - name: Create ARIA Case (Failure)
        if: failure()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          curl -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "u_short_description": "Pipeline Failed",
              "u_situation_details": "Build failed",
              "u_case_state": "failed",
              "u_decision": "auto heal",
              "u_pipelineid": "'${{ github.run_id }}'"
            }'

      - name: Close ARIA Case (Success)
        if: success()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          curl -X PATCH \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case?sysparm_query=u_pipelineid=${{ github.run_id }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "u_case_state": "closed"
            }'
