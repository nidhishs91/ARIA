name: ARIA - Create ServiceNow Incident (Static)

on:
  push:
    branches:
      - main

jobs:
  create-incident:
    runs-on: ubuntu-latest

    steps:
      - name: Create Incident in ServiceNow
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          echo "Creating incident in ServiceNow using Table API"

          curl -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/incident" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "short_description": "AWS RDS DOWN | prod-payment-db-01 | Connection Timeout",
              "description": "Datadog Alert Triggered\n\nPlatform: AWS\nService: Payment Processing\nCI: prod-payment-db-01\nRegion: us-east-1\n\nIssue:\n- RDS connection timeout\n- CPU usage critical\n\nAction Required:\nInvestigate database connectivity immediately."
            }'
