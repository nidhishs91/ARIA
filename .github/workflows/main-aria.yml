name: ARIA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:

      # ✅ Step 0: Install jq (required)
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ✅ Step 1: Run Application
      - name: Run Application
        id: run_app
        run: |
          echo "Running app..."
          exit 0   # ❌ FAIL (change to exit 0 to test success)

      # ✅ Step 2: If FAILED → Create Case + Signal
      - name: Create ARIA Case + Signal (Failure)
        if: failure()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |

          echo "Creating ARIA Case..."

          CASE_RESPONSE=$(curl -s -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "u_short_description": "Pipeline Failed",
              "u_situation_details": "Build failed",
              "u_case_state": "work in progress",
              "u_pipelineid": "ARIA_MAIN_PIPELINE"
            }')

          echo "Case Response: $CASE_RESPONSE"

          CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result.sys_id')

          echo "Case sys_id: $CASE_SYS_ID"

          echo "Creating Signal..."

          curl -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data "{
              \"u_case\": \"$CASE_SYS_ID\",
              \"u_signal_source\": \"GitHub Actions\",
              \"u_signal_type\": \"pipeline failure\",
              \"u_external_id\": \"${{ github.run_id }}\",
              \"u_status\": \"active\"
            }"

      # ✅ Step 3: If SUCCESS → Close Case + Resolve Signal
      - name: Close ARIA Case + Resolve Signal
        if: success()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |

          echo "Fetching existing ARIA Case..."

          RESPONSE=$(curl -s -u "${SN_USERNAME}:${SN_PASSWORD}" \
          "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case?sysparm_query=u_pipelineid=ARIA_MAIN_PIPELINE%5Eu_case_state=work%20in%20progress&sysparm_limit=1")

          echo "Response: $RESPONSE"

          SYS_ID=$(echo "$RESPONSE" | jq -r '.result[0].sys_id // empty')

          echo "Case sys_id: $SYS_ID"

          if [ -n "$SYS_ID" ]; then

            echo "Closing ARIA Case..."

            curl -X PATCH \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case/$SYS_ID" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -u "${SN_USERNAME}:${SN_PASSWORD}" \
              --data '{
                "u_case_state": "closed",
                "u_decision": "manual heal"
              }'

            echo "Fetching active signal..."

            SIGNAL_RESPONSE=$(curl -s -u "${SN_USERNAME}:${SN_PASSWORD}" \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source?sysparm_query=u_case=$SYS_ID^u_status=active&sysparm_limit=1")

            echo "Signal response: $SIGNAL_RESPONSE"

            SIGNAL_SYS_ID=$(echo "$SIGNAL_RESPONSE" | jq -r '.result[0].sys_id // empty')

            if [ -n "$SIGNAL_SYS_ID" ]; then

              echo "Resolving signal..."

              curl -X PATCH \
                "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source/$SIGNAL_SYS_ID" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -u "${SN_USERNAME}:${SN_PASSWORD}" \
                --data '{
                  "u_status": "resolved"
                }'

            else
              echo "No active signal found"
            fi

          else
            echo "No active ARIA case found"
          fi
