name: ARIA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Step 2: Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install sentry-sdk

      # ✅ Step 3: Run Application (capture error properly)
      - name: Run Application
        id: run_app
        continue-on-error: true
        run: |
          echo "Running app with Sentry..."

          # Capture output to file
          python app.py > /tmp/app_output.txt 2>&1
          EXIT_CODE=$?

          # Read the output
          OUTPUT=$(cat /tmp/app_output.txt)
          echo "$OUTPUT"

          # Store output
          {
            echo "error<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

      # ✅ Step 4: If FAILED → Create Case + Signal
      - name: Create ARIA Case + Signal (Failure)
        if: steps.run_app.outcome == 'failure'
        env:
          ERROR_MSG: ${{ steps.run_app.outputs.error }}
          EXIT_CODE: ${{ steps.run_app.outputs.exit_code }}
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          echo "=== Captured Error ==="
          echo "$ERROR_MSG"
          echo "Exit Code: $EXIT_CODE"
          echo "======================="

          CASE_RESPONSE=$(curl -s -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "u_short_description": "Pipeline Failed",
              "u_situation_details": "Build failed",
              "u_case_state": "work in progress",
              "u_pipelineid": "ARIA_MAIN_PIPELINE"
            }')

          echo "Case Response: $CASE_RESPONSE"

          CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result.sys_id // empty')

          if [ -z "$CASE_SYS_ID" ] || [ "$CASE_SYS_ID" = "null" ]; then
            echo "ERROR: Case creation failed"
            exit 1
          fi

          SIGNAL_RESPONSE=$(curl -s -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data "{
              \"u_case\": \"$CASE_SYS_ID\",
              \"u_signal_source\": \"GitHub + Sentry\",
              \"u_signal_type\": \"pipeline failure\",
              \"u_external_id\": \"${{ github.run_id }}\",
              \"u_status\": \"active\",
              \"u_pas\": $(echo "$ERROR_MSG" | jq -Rs .)
            }")

          echo "Signal Response: $SIGNAL_RESPONSE"

      # ✅ Step 5: If SUCCESS → Close Case + Resolve Signal
      - name: Close ARIA Case + Resolve Signal
        if: success()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          echo "Fetching ARIA Case..."

          RESPONSE=$(curl -s -u "${SN_USERNAME}:${SN_PASSWORD}" \
          "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case?sysparm_query=u_pipelineid=ARIA_MAIN_PIPELINE%5Eu_case_state=work%20in%20progress&sysparm_limit=1")

          echo "Case Fetch Response: $RESPONSE"

          SYS_ID=$(echo "$RESPONSE" | jq -r '.result[0].sys_id // empty')

          if [ -n "$SYS_ID" ] && [ "$SYS_ID" != "null" ]; then

            echo "Closing Case: $SYS_ID"

            curl -X PATCH \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case/$SYS_ID" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -u "${SN_USERNAME}:${SN_PASSWORD}" \
              --data '{
                "u_case_state": "closed",
                "u_decision": "manual heal"
              }'

            echo "Fetching Signal..."

            SIGNAL_RESPONSE=$(curl -s -u "${SN_USERNAME}:${SN_PASSWORD}" \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source?sysparm_query=u_case=$SYS_ID^u_status=active&sysparm_limit=1")

            echo "Signal Fetch Response: $SIGNAL_RESPONSE"

            SIGNAL_SYS_ID=$(echo "$SIGNAL_RESPONSE" | jq -r '.result[0].sys_id // empty')

            if [ -n "$SIGNAL_SYS_ID" ] && [ "$SIGNAL_SYS_ID" != "null" ]; then

              echo "Resolving Signal: $SIGNAL_SYS_ID"

              curl -X PATCH \
                "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source/$SIGNAL_SYS_ID" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -u "${SN_USERNAME}:${SN_PASSWORD}" \
                --data '{
                  "u_status": "resolved"
                }'

              echo "Signal resolved ✅"
            else
              echo "No active signal found"
            fi

          else
            echo "No active ARIA case found"
          fi
