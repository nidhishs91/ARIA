name: ARIA Pipeline

on:
  push:
    branches:
      - main

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:

      # ✅ Step 1: Simulate pipeline work
      - name: Run Application
        id: run_app
        run: |
          echo "Running app..."
          exit 1   # ❌ simulate failure (later remove)

      # ✅ Step 2: If FAILED → create ARIA Case
      - name: Create ARIA Case (Failure)
        if: failure()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          curl -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "u_short_description": "Pipeline Failed",
              "u_situation_details": "Build failed in GitHub Actions",
              "u_case_state": "failed",
              "u_decision": "auto heal"
            }'

      # ✅ Step 3: If SUCCESS → close case
      - name: Close ARIA Case (Success)
        if: success()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          echo "Pipeline successful - should close case"
