name: ARIA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:

      # ✅ Step 1: Run Application (SUCCESS for test)
      - name: Run Application
        id: run_app
        run: |
          echo "Running app..."
          exit 0

      # ✅ Step 2: If FAILED → create ARIA Case
      - name: Create ARIA Case (Failure)
        if: failure()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          curl -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "u_short_description": "Pipeline Failed",
              "u_situation_details": "Build failed",
              "u_case_state": "failed",
              "u_decision": "auto heal",
              "u_pipelineid": "'${{ github.run_id }}'"
            }'

      # ✅ Step 3: If SUCCESS → close SAME ARIA case
      - name: Close ARIA Case (Success)
        if: success()
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |
          echo "Fetching ARIA Case sys_id"

          RESPONSE=$(curl -s -u "${SN_USERNAME}:${SN_PASSWORD}" \
          "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case?sysparm_query=u_pipelineid=${{ github.run_id }}&sysparm_limit=1")

          echo "Response: $RESPONSE"

          SYS_ID=$(echo $RESPONSE | jq -r '.result[0].sys_id')

          echo "Updating ARIA Case: $SYS_ID"

          curl -X PATCH \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case/$SYS_ID" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${SN_USERNAME}:${SN_PASSWORD}" \
            --data '{
              "u_case_state": "closed"
            }'
