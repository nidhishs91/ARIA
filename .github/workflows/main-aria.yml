name: ARIA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:

      # ✅ 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ 2. Install Dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install sentry-sdk

      # ✅ 3. Run Application
      - name: Run Application
        id: run_app
        continue-on-error: true
        run: |
          set +e

          OUTPUT=$(python app.py 2>&1)
          EXIT_CODE=$?

          echo "$OUTPUT"

          EVENT_ID=$(echo "$OUTPUT" | grep "Captured Event ID:" | awk '{print $4}')
          echo "event_id=$EVENT_ID" >> $GITHUB_OUTPUT

          echo "error<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

      # ✅ 4. Get Sentry Issue ID
      - name: Get Sentry Issue ID
        if: steps.run_app.outputs.exit_code != '0'
        id: sentry_issue
        env:
          SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
        run: |
          EVENT_ID="${{ steps.run_app.outputs.event_id }}"
          ORG_SLUG="demo1-i6"
          PROJECT_SLUG="python"

          if [ -z "$EVENT_ID" ]; then
            exit 0
          fi

          for i in {1..10}
          do
            ISSUE_RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${SENTRY_TOKEN}" \
              "https://us.sentry.io/api/0/projects/$ORG_SLUG/$PROJECT_SLUG/events/$EVENT_ID/")

            ISSUE_ID=$(echo "$ISSUE_RESPONSE" | jq -r '.groupID // empty')

            if [ -n "$ISSUE_ID" ]; then
              echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep 5
          done

          exit 0

      # ✅ 5. Create ARIA Case + Signal
      - name: Create ARIA Case + Signal
        if: steps.run_app.outputs.exit_code != '0'
        env:
          ERROR_MSG: ${{ steps.run_app.outputs.error }}
          ISSUE_ID: ${{ steps.sentry_issue.outputs.issue_id }}
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |

          SAFE_ERROR=$(echo "$ERROR_MSG" | jq -Rs .)
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          PIPELINE_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          CORRELATION_ID="${{ github.workflow }}-${{ github.ref_name }}"

          CASE_PAYLOAD=$(jq -n \
            --arg short "Pipeline Failed" \
            --arg state "work in progress" \
            --arg pipeline "ARIA_MAIN_PIPELINE" \
            --arg ext "$CORRELATION_ID" \
            --arg opened "$CURRENT_TIME" \
            --arg url "$PIPELINE_URL" \
            --arg issue "${ISSUE_ID:-N/A}" \
            '{
              u_short_description:$short,
              u_case_state:$state,
              u_pipelineid:$pipeline,
              u_external_id:$ext,
              u_opened_at:$opened,
              u_case_url:$url,
              u_sentry_issue_id:$issue
            }')

          CASE_RESPONSE=$(curl -s -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case" \
            -H "Content-Type: application/json" \
            -u "$SN_USERNAME:$SN_PASSWORD" \
            --data "$CASE_PAYLOAD")

          CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result.sys_id')

          SIGNAL_PAYLOAD=$(jq -n \
            --arg case "$CASE_SYS_ID" \
            --arg src "GitHub + Sentry" \
            --arg type "pipeline failure" \
            --arg ext "$CORRELATION_ID" \
            --arg status "active" \
            --arg err "$ERROR_MSG" \
            --arg issue "${ISSUE_ID:-N/A}" \
            '{
              u_case:$case,
              u_signal_source:$src,
              u_signal_type:$type,
              u_external_id:$ext,
              u_status:$status,
              u_error:$err,
              u_sentry_issue_id:$issue
            }')

          curl -s -X POST \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source" \
            -H "Content-Type: application/json" \
            -u "$SN_USERNAME:$SN_PASSWORD" \
            --data "$SIGNAL_PAYLOAD"

      # ✅ 6. Close ARIA Case + Signal + Sentry Issue
      - name: Close ARIA Case + Signal
        if: steps.run_app.outputs.exit_code == '0'
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
          SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
          ORG_SLUG: demo1-i6
        run: |

          CORRELATION_ID="${{ github.workflow }}-${{ github.ref_name }}"
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          ORG_SLUG="demo1-i6"

          CASE_RESPONSE=$(curl -s -u "$SN_USERNAME:$SN_PASSWORD" \
          "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case?sysparm_query=u_external_id=$CORRELATION_ID%5Eu_case_state=work%20in%20progress&sysparm_limit=1")

          CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result[0].sys_id // empty')
          SENTRY_ID=$(echo "$CASE_RESPONSE" | jq -r '.result[0].u_sentry_issue_id // empty')

          if [ -z "$CASE_SYS_ID" ] || [ "$CASE_SYS_ID" = "null" ]; then
            echo "No case found"
            exit 0
          fi

          echo "✅ Closing ARIA case"

          curl -s -X PATCH \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case/$CASE_SYS_ID" \
            -H "Content-Type: application/json" \
            -u "$SN_USERNAME:$SN_PASSWORD" \
            --data "{\"u_case_state\":\"closed\",\"u_closed_at\":\"$CURRENT_TIME\"}"

          SIGNAL_RESPONSE=$(curl -s -u "$SN_USERNAME:$SN_PASSWORD" \
          "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source?sysparm_query=u_case=$CASE_SYS_ID%5Eu_status=active&sysparm_limit=1")

          SIGNAL_SYS_ID=$(echo "$SIGNAL_RESPONSE" | jq -r '.result[0].sys_id // empty')

          if [ -n "$SIGNAL_SYS_ID" ] && [ "$SIGNAL_SYS_ID" != "null" ]; then
            curl -s -X PATCH \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source/$SIGNAL_SYS_ID" \
              -H "Content-Type: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data '{"u_status":"resolved"}'
          fi

          # ✅ Close Sentry Issue
          if [ -n "$SENTRY_ID" ] && [ "$SENTRY_ID" != "N/A" ]; then
            echo "Closing Sentry issue $SENTRY_ID"
            
            curl -s -X PUT \
              -H "Authorization: Bearer $SENTRY_TOKEN" \
              -H "Content-Type: application/json" \
              "https://us.sentry.io/api/0/issues/$SENTRY_ID/" \
              --data '{"status":"resolved"}'
          fi

      # ✅ 7. Force pipeline red on failure
      - name: Mark Pipeline Failed
        if: steps.run_app.outputs.exit_code != '0'
        run: |
          exit 1
