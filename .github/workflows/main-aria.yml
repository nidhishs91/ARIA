name: ARIA Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aria-flow:
    runs-on: ubuntu-latest

    steps:

      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Install jq
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ✅ Run Application
      - name: Run Application
        id: run_app
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(python app.py 2>&1)
          EXIT_CODE=$?

          echo "$OUTPUT"

          echo "error<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          exit $EXIT_CODE

      # ✅ Handle Failure (Create or Update Case + Signal)
      - name: Create or Update ARIA Case
        if: steps.run_app.outputs.exit_code != '0'
        env:
          ERROR_MSG: ${{ steps.run_app.outputs.error }}
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |

          CORRELATION_ID="ARIA_MAIN1_PIPELINE_${{ github.ref_name }}"
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          PIPELINE_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GITHUB_RUN_ID="${{ github.run_id }}"

          echo "Checking for existing case..."

          CASE_RESPONSE=$(curl -s -u "$SN_USERNAME:$SN_PASSWORD" \
          "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case?sysparm_query=u_external_id=$CORRELATION_ID&sysparm_limit=1&sysparm_fields=sys_id")

          CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result[0].sys_id // empty')

          if [ -z "$CASE_SYS_ID" ]; then

            echo "Creating new ARIA case..."

            CASE_PAYLOAD=$(jq -n \
              --arg state "work in progress" \
              --arg ext "$CORRELATION_ID" \
              --arg opened "$CURRENT_TIME" \
              --arg url "$PIPELINE_URL" \
              --arg desc "GitHub Pipeline Failure on branch ${{ github.ref_name }}" \
              '{
                u_case_state:$state,
                u_external_id:$ext,
                u_opened_at:$opened,
                u_u:$url,
                u_situation_details:$desc
              }')

            CASE_RESPONSE=$(curl -s -X POST \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case" \
              -H "Content-Type: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data "$CASE_PAYLOAD")

            CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result.sys_id')

            echo "Creating Signal..."

            curl -s -X POST \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source" \
              -H "Content-Type: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data "$(jq -n \
                --arg case_id "$CASE_SYS_ID" \
                --arg src "GitHub" \
                --arg type "pipeline failure" \
                --arg ext "$GITHUB_RUN_ID" \
                --arg status "active" \
                --arg err "$ERROR_MSG" \
                '{
                  u_case:$case_id,
                  u_signal_source:$src,
                  u_signal_type:$type,
                  u_external_id:$ext,
                  u_status:$status,
                  u_error:$err
                }')"

          else

            echo "Updating existing case → Monitoring..."

            curl -s -X PATCH \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case/$CASE_SYS_ID" \
              -H "Content-Type: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data '{"u_case_state":"monitoring","u_situation_details":"Pipeline still failing - monitoring"}'

            echo "Updating existing active signal..."

            SIGNAL_RESPONSE=$(curl -s -u "$SN_USERNAME:$SN_PASSWORD" \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source?sysparm_query=u_case=$CASE_SYS_ID%5Eu_status=active&sysparm_limit=1&sysparm_fields=sys_id")

            SIGNAL_SYS_ID=$(echo "$SIGNAL_RESPONSE" | jq -r '.result[0].sys_id // empty')

            if [ -n "$SIGNAL_SYS_ID" ]; then
              curl -s -X PATCH \
                "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source/$SIGNAL_SYS_ID" \
                -H "Content-Type: application/json" \
                -u "$SN_USERNAME:$SN_PASSWORD" \
                --data "$(jq -n \
                  --arg src "GitHub" \
                  --arg type "pipeline failure" \
                  --arg ext "$GITHUB_RUN_ID" \
                  --arg status "active" \
                  --arg err "$ERROR_MSG" \
                  '{
                    u_signal_source:$src,
                    u_signal_type:$type,
                    u_external_id:$ext,
                    u_status:$status,
                    u_error:$err
                  }')"
            fi

          fi

      # ✅ Handle Success (Close Case + Resolve Signal)
      - name: Close ARIA Case
        if: steps.run_app.outputs.exit_code == '0'
        env:
          SN_INSTANCE: ${{ secrets.SN_INSTANCE }}
          SN_USERNAME: ${{ secrets.SN_USERNAME }}
          SN_PASSWORD: ${{ secrets.SN_PASSWORD }}
        run: |

          CORRELATION_ID="ARIA_MAIN1_PIPELINE_${{ github.ref_name }}"
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")

          CASE_RESPONSE=$(curl -s -u "$SN_USERNAME:$SN_PASSWORD" \
          "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case?sysparm_query=u_external_id=$CORRELATION_ID%5Eu_case_state!=closed&sysparm_limit=1&sysparm_fields=sys_id")

          CASE_SYS_ID=$(echo "$CASE_RESPONSE" | jq -r '.result[0].sys_id // empty')

          if [ -n "$CASE_SYS_ID" ]; then

            echo "Closing ARIA case..."

            curl -s -X PATCH \
              "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_case/$CASE_SYS_ID" \
              -H "Content-Type: application/json" \
              -u "$SN_USERNAME:$SN_PASSWORD" \
              --data "{\"u_case_state\":\"closed\",\"u_closedat\":\"$CURRENT_TIME\",\"u_situation_details\":\"Pipeline successful\"}"

            echo "Resolving signal..."

            SIGNAL_RESPONSE=$(curl -s -u "$SN_USERNAME:$SN_PASSWORD" \
            "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source?sysparm_query=u_case=$CASE_SYS_ID%5Eu_status=active&sysparm_limit=1&sysparm_fields=sys_id")

            SIGNAL_SYS_ID=$(echo "$SIGNAL_RESPONSE" | jq -r '.result[0].sys_id // empty')

            if [ -n "$SIGNAL_SYS_ID" ]; then
              curl -s -X PATCH \
                "https://${SN_INSTANCE}.service-now.com/api/now/table/u_aria_signal_source/$SIGNAL_SYS_ID" \
                -H "Content-Type: application/json" \
                -u "$SN_USERNAME:$SN_PASSWORD" \
                --data '{"u_status":"resolved"}'
            fi

          fi

      # ✅ Force RED on failure
      - name: Mark Pipeline Failed
        if: steps.run_app.outputs.exit_code != '0'
        run: exit 1
